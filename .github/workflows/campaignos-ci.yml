name: CampaignOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: campaignos-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.29"
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "22.23.1"
  TERRAFORM_VERSION: "1.15.8"
  TERRAFORM_LINUX_AMD64_SHA256: "d25ce7b6902013ad905db3d2eab0be4cd905887fe88b81a6171b8d5503c31f3d"

jobs:
  quality:
    name: Locked quality and contract suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate GitHub Actions workflows
        run: >-
          docker run --rm --network none --cap-drop ALL
          --security-opt no-new-privileges
          --volume "${GITHUB_WORKSPACE}:/repo:ro" --workdir /repo
          rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked dependencies
        run: uv sync --all-groups --locked
      - name: Lint
        run: make lint
      - name: Verify formatting
        run: make format-check
      - name: Type-check
        run: make typecheck
      - name: Run unit and contract tests
        run: make test
      - name: Verify executable program truth
        run: make program-verify
      - name: Reject whitespace errors in the submitted range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi
          git diff --check "${BASE_SHA}...HEAD"

  postgres-integration:
    name: PostgreSQL migrations and tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.3-alpine3.23@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
        env:
          POSTGRES_DB: campaignos_ci_test
          POSTGRES_USER: campaignos
          POSTGRES_PASSWORD: campaignos_ci_only
        options: >-
          --health-cmd "pg_isready -U campaignos -d campaignos_ci_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports:
          - 5432:5432
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked dependencies
        run: uv sync --all-groups --locked
      - name: Prove migrations and database-enforced RLS
        env:
          CAMPAIGNOS_TEST_DATABASE_URL: postgresql+psycopg://campaignos:campaignos_ci_only@127.0.0.1:5432/campaignos_ci_test
        run: make test-postgres

  dependency-audit:
    name: Locked production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked audit tool
        run: uv sync --all-groups --locked
      - name: Export hash-locked production requirements
        run: >-
          uv export --locked --no-dev --no-emit-project
          --format requirements-txt
          --output-file /tmp/campaignos-requirements.txt
      - name: Audit production dependencies
        run: >-
          uv run --locked pip-audit
          --require-hashes
          --disable-pip
          --requirement /tmp/campaignos-requirements.txt

  supply-chain-evidence:
    name: Software bill of materials and source provenance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout exact source head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Verify versioned CI security policy
        run: >-
          python scripts/ci/verify_ci_policy.py
          --report artifacts/supply-chain/ci-policy-report.json
      - name: Generate deterministic SBOM and unsigned source provenance
        run: >-
          python scripts/ci/generate_supply_chain_evidence.py
          --output-dir artifacts/supply-chain
          --revision "${{ github.event.pull_request.head.sha || github.sha }}"
      - name: Attest SBOM and source provenance with GitHub OIDC
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/supply-chain/cyclonedx-sbom.json
            artifacts/supply-chain/source-manifest.json
            artifacts/supply-chain/provenance.intoto.json
            artifacts/supply-chain/SHA256SUMS
          show-summary: true
      - name: Upload supply-chain evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: campaignos-supply-chain-evidence
          path: artifacts/supply-chain/
          if-no-files-found: error
          retention-days: 30

  terraform-plan-policy:
    name: Terraform plan-only policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TF_IN_AUTOMATION: "1"
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install exact Terraform CLI from verified checksum
        run: |
          set -euo pipefail
          archive="/tmp/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" \
            --output "$archive"
          echo "${TERRAFORM_LINUX_AMD64_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p /tmp/campaignos-terraform
          unzip -q "$archive" -d /tmp/campaignos-terraform
          echo "/tmp/campaignos-terraform" >> "$GITHUB_PATH"
      - name: Verify Terraform version and plan-only policy
        run: |
          set -euo pipefail
          rm -rf infra/terraform/bootstrap/.terraform infra/terraform/stacks/platform/.terraform
          for attempt in 1 2; do
            if TERRAFORM=/tmp/campaignos-terraform/terraform make terraform-verify; then
              exit 0
            fi
            [ "$attempt" -lt 2 ] || exit 1
            rm -rf infra/terraform/bootstrap/.terraform infra/terraform/stacks/platform/.terraform
            sleep 5
          done

  frontend:
    name: Dynamic frontend contracts and browser review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.3-alpine3.23@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
        env:
          POSTGRES_DB: campaignos_functional_test
          POSTGRES_USER: campaignos_admin
          POSTGRES_PASSWORD: campaignos_admin_ci_only
        options: >-
          --health-cmd "pg_isready -U campaignos_admin -d campaignos_functional_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
        ports:
          - 5432:5432
    env:
      CAMPAIGNOS_FRONTEND_MODE: demo_read_only
      CAMPAIGNOS_FRONTEND_ENVIRONMENT: test
      CAMPAIGNOS_FRONTEND_ARTIFACT_DIR: artifacts/c3-front-001
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked Python browser-review dependencies
        run: uv sync --all-groups --locked
      - name: Verify locked frontend contracts and production build
        run: make frontend-verify
      - name: Install the locked Playwright Chromium runtime
        run: uv run --locked playwright install --with-deps chromium
      - name: Review the production shell in desktop, mobile and reduced motion
        run: make frontend-e2e
      - name: Exercise the API-backed functional onboarding journey
        env:
          CAMPAIGNOS_FRONTEND_ARTIFACT_DIR: artifacts/c3-front-002
          CAMPAIGNOS_FUNCTIONAL_ADMIN_DATABASE_URL: postgresql+psycopg://campaignos_admin:campaignos_admin_ci_only@127.0.0.1:5432/campaignos_functional_test
          CAMPAIGNOS_FUNCTIONAL_APP_DATABASE_URL: postgresql+psycopg://campaignos_app:campaignos_app_ci_only@127.0.0.1:5432/campaignos_functional_test
          CAMPAIGNOS_FUNCTIONAL_APP_DATABASE_USER: campaignos_app
          CAMPAIGNOS_FUNCTIONAL_APP_DATABASE_PASSWORD: campaignos_app_ci_only
          CAMPAIGNOS_FUNCTIONAL_DATABASE_NAME: campaignos_functional_test
          CAMPAIGNOS_DEVELOPMENT_ACCESS_TOKEN: campaignos-local-development-token
        run: |
          mkdir -p artifacts/c3-front-002
          if ! ./scripts/frontend/e2e_functional_onboarding_host.sh >artifacts/c3-front-002/harness.log 2>&1; then
            tail -n 160 artifacts/c3-front-002/harness.log
            exit 1
          fi
          tail -n 40 artifacts/c3-front-002/harness.log
      - name: Build the non-root frontend container
        run: docker build --file frontend/Dockerfile --tag campaignos-frontend:${{ github.sha }} frontend
      - name: Upload dynamic frontend review evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: campaignos-frontend-review
          path: |
            artifacts/c3-front-001/
            artifacts/c3-front-002/
          if-no-files-found: error
          retention-days: 30

  secret-scan:
    name: Repository secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan committed history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL Python and JavaScript analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: python,javascript-typescript
      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1

  stack-e2e:
    name: Constrained local stack E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate resolved Compose configuration
        run: docker compose --env-file .env.example config --quiet
      - name: Build and prove the disposable local stack
        env:
          ENV_FILE: .env.example
        run: ./scripts/dev/e2e.sh
