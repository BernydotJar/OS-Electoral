name: C1-FRONT-002-V1 Runtime Visual Review

on:
  pull_request:
    paths:
      - "web/**"
      - "frontend/**"
      - "core/**"
      - "tests/**"
      - "schemas/**"
      - "campaigns/**"
      - "fixtures/**"
      - "architecture/**"
      - "scripts/frontend/**"
      - "scripts/campaign/**"
      - "scripts/architecture/**"
      - "agent/C2-PLAT-001/**"
      - "agent/C2-PROD-001/**"
      - "agent/C2-PROD-002/**"
      - "agent/C2-PROD-003/**"
      - "docs/**"
      - ".github/workflows/c1-front-002-v1.yml"
      - "feature_list.json"
      - "progress/C1-FRONT-002-V1-validation-report.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-visual-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked dependencies
        run: uv sync --all-groups --locked
      - name: Install Playwright
        run: uv run --locked playwright install --with-deps chromium
      - name: Validate evidence snapshot
        run: uv run --locked python scripts/frontend/validate_evidence_control_room.py
      - name: Validate Campaign Team Command Center
        run: uv run --locked python scripts/frontend/validate_campaign_team_command_center.py
      - name: Validate Daily War Room
        run: uv run --locked python scripts/frontend/validate_daily_war_room.py
      - name: Validate Premium Slate design system
        run: uv run --locked python scripts/frontend/validate_premium_slate.py
      - name: Validate Governance Workspace
        run: uv run --locked python scripts/frontend/validate_governance_workspace.py
      - name: Validate governed campaign workspace core
        run: uv run --locked python scripts/campaign/validate_c2_plat_001.py
      - name: Validate Candidate Brand workspace
        run: uv run --locked python scripts/campaign/validate_c2_prod_001.py
      - name: Validate Approval Inbox and Decision Ledger
        run: uv run --locked python scripts/campaign/validate_c2_prod_002.py
      - name: Validate Daily Operating Workflow
        run: uv run --locked python scripts/campaign/validate_c2_prod_003.py
      - name: Validate authorization policy boundary
        run: uv run --locked python scripts/campaign/validate_c2_saas_001a.py
      - name: Validate append-only persistence and audit boundary
        run: uv run --locked python scripts/campaign/validate_c2_saas_001b.py
      - name: Validate repository interfaces and transaction boundary
        run: uv run --locked python scripts/campaign/validate_c2_saas_001c.py
      - name: Validate audit observability read model
        run: uv run --locked python scripts/campaign/validate_c2_obs_001.py
      - name: Validate read-only application service contracts
        run: uv run --locked python scripts/campaign/validate_c2_api_001a.py
      - name: Validate cross-tenant adversarial integration harness
        run: uv run --locked python scripts/campaign/validate_c2_test_001.py
      - name: Validate operator runbook and release gate guide
        run: uv run --locked python scripts/campaign/validate_c2_docs_001.py
      - name: Validate evidence-grounded extraction and citation contracts
        run: uv run --locked python scripts/campaign/validate_c2_ai_001a.py
      - name: Validate executable program architecture
        run: uv run --locked python scripts/architecture/validate_program_state.py
      - name: Validate diff whitespace
        run: git diff --check origin/main...HEAD
      - name: Start static server
        run: |
          mkdir -p artifacts/c1-front-002-v1
          uv run --locked python -m http.server 4173 --directory web > artifacts/c1-front-002-v1/server.log 2>&1 &
          echo $! > artifacts/c1-front-002-v1/server.pid
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then exit 0; fi
            sleep 1
          done
          cat artifacts/c1-front-002-v1/server.log
          exit 1
      - name: Run browser review
        env:
          CAMPAIGNOS_URL: http://127.0.0.1:4173
          CAMPAIGNOS_ARTIFACT_DIR: artifacts/c1-front-002-v1
        run: |
          set -o pipefail
          uv run --locked python scripts/frontend/runtime_visual_review.py 2>&1 | tee artifacts/c1-front-002-v1/runtime-run.log
      - name: Review Governance Workspace
        env:
          CAMPAIGNOS_URL: http://127.0.0.1:4173
          CAMPAIGNOS_ARTIFACT_DIR: artifacts/c1-front-002-v1
        run: uv run --locked python scripts/frontend/review_governance_workspace.py
      - name: Upload visual review evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: c1-front-002-v1-visual-review
          path: artifacts/c1-front-002-v1/
          if-no-files-found: error
          retention-days: 30
