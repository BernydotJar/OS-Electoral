name: C1-FRONT-002-V1 Runtime Visual Review

on:
  pull_request:
    paths:
      - "web/**"
      - "core/**"
      - "tests/**"
      - "schemas/**"
      - "campaigns/**"
      - "fixtures/**"
      - "scripts/frontend/**"
      - "scripts/campaign/**"
      - "agent/C2-PLAT-001/**"
      - "agent/C2-PROD-001/**"
      - "agent/C2-PROD-002/**"
      - "docs/campaign-workspaces.md"
      - "docs/candidate-brand-workspace.md"
      - "docs/approval-inbox-ledger.md"
      - ".github/workflows/c1-front-002-v1.yml"
      - "feature_list.json"
      - "progress/C1-FRONT-002-V1-validation-report.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-visual-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --disable-pip-version-check playwright==1.52.0
          python -m playwright install --with-deps chromium

      - name: Validate evidence snapshot
        run: python3 scripts/frontend/validate_evidence_control_room.py

      - name: Validate Campaign Team Command Center
        run: python3 scripts/frontend/validate_campaign_team_command_center.py

      - name: Validate Daily War Room
        run: python3 scripts/frontend/validate_daily_war_room.py

      - name: Validate Premium Slate design system
        run: python3 scripts/frontend/validate_premium_slate.py

      - name: Validate governed campaign workspace core
        run: python3 scripts/campaign/validate_c2_plat_001.py

      - name: Validate Candidate Brand workspace
        run: python3 scripts/campaign/validate_c2_prod_001.py

      - name: Validate Approval Inbox and Decision Ledger
        run: python3 scripts/campaign/validate_c2_prod_002.py

      - name: Validate diff whitespace
        run: git diff --check origin/main...HEAD

      - name: Start static server
        run: |
          mkdir -p artifacts/c1-front-002-v1
          python3 -m http.server 4173 --directory web > artifacts/c1-front-002-v1/server.log 2>&1 &
          echo $! > artifacts/c1-front-002-v1/server.pid
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/c1-front-002-v1/server.log
          exit 1

      - name: Run browser review
        env:
          CAMPAIGNOS_URL: http://127.0.0.1:4173
          CAMPAIGNOS_ARTIFACT_DIR: artifacts/c1-front-002-v1
        run: |
          set -o pipefail
          python3 scripts/frontend/runtime_visual_review.py 2>&1 | tee artifacts/c1-front-002-v1/runtime-run.log

      - name: Upload visual review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c1-front-002-v1-visual-review
          path: artifacts/c1-front-002-v1/
          if-no-files-found: error
          retention-days: 30
