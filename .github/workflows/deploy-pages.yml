name: Publish CampaignOS static demo (non-production)

run-name: "Static demo publish by @${{ github.actor }} — ${{ inputs.reason }}"

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type DEMO_NON_PRODUCTION to confirm this is only a static public demo"
        required: true
        type: string
      reason:
        description: "Auditable reason for republishing the demo"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages-demo-non-production
  cancel-in-progress: false

jobs:
  authorize-demo-publish:
    name: Validate explicit non-production confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Reject production claims and non-main refs
        env:
          DEMO_CONFIRMATION: ${{ inputs.confirmation }}
          DISPATCH_REF: ${{ github.ref_name }}
        run: |
          if [ "$DEMO_CONFIRMATION" != "DEMO_NON_PRODUCTION" ]; then
            echo "Refusing publish: confirmation must equal DEMO_NON_PRODUCTION." >&2
            exit 1
          fi
          if [ "$DISPATCH_REF" != "main" ]; then
            echo "Refusing publish: the static demo may only be published from main." >&2
            exit 1
          fi
          echo "Authorized static demo publish. This is not dev, staging or production."

  deploy-static-demo:
    name: Deploy static demo (never production)
    needs: authorize-demo-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout exact dispatch commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload static demo
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./web

      - name: Deploy static demo
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
