version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: America/Guatemala
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: wednesday
      time: "09:15"
      timezone: America/Guatemala
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:30"
      timezone: America/Guatemala
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: wednesday
      time: "10:15"
      timezone: America/Guatemala
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: wednesday
      time: "10:00"
      timezone: America/Guatemala
    open-pull-requests-limit: 5

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:45"
      timezone: America/Guatemala
    open-pull-requests-limit: 5
